name: Validate Community Markers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'community-markers/**.json'

concurrency:
  group: validate-community-markers
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate changed markers
        id: validate
        run: |
          echo "=== Validation started at $(date) ===" > validation.log
          for file in community-markers/*.json; do
            if [ -f "$file" ]; then
              echo "Checking file: $file" >> validation.log
              python validate-community-marker.py "$file" >> validation.log 2>&1
              echo "----------------------------------------" >> validation.log
            fi
          done
          echo "=== Validation completed ===" >> validation.log

      - name: Post validation results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'No log file found';
            try {
              log = fs.readFileSync('validation.log', 'utf8').trim();
            } catch (e) {}

            const lines = log.split('\n');
            let allValid = true;
            let errorMessage = 'Unknown error';

            for (const line of lines) {
              if (line.includes('VALID:False')) allValid = false;
              if (line.includes('MESSAGE:')) {
                errorMessage = line.replace('MESSAGE:', '').trim();
              }
            }

            let summary = '## 🔍 Community Marker Validation Report\n\n';
            let labels = ['community-submission'];

            if (!allValid) {
              summary += `❌ Marker Failed Validation.\n\n**Reason:** ${errorMessage}\n`;
              labels = ['invalid', 'needs-review', 'community-submission'];
            } else {
              summary += '✅ Marker Passed Validation.\n';
              labels = ['validated', 'community-submission'];
            }

            summary += `\n**Full Log:**\n\`\`\`\n${log}\n\`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

            await github.rest.issues.removeAllLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
