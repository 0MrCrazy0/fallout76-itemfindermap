name: Validate Community Markers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'community-markers/**.json'

# ── CONCURRENCY FIX ── Prevents cancelled checks when multiple markers are submitted quickly
concurrency:
  group: validate-community-markers
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate changed markers
        id: validate
        run: |
          for file in $(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep '^community-markers/.*\.json$'); do
            python validate-community-marker.py "$file" >> validation.log
          done

      - name: Post validation results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('validation.log', 'utf8').trim();
            const results = log.split('\n').filter(line => line.trim() !== '');

            let summary = '## 🔍 Community Marker Validation Report\n\n';
            let allValid = true;
            let labels = ['community-submission'];

            results.forEach(line => {
              if (line.includes('VALID:False')) allValid = false;
            });

            if (!allValid) {
              summary += '❌ Marker Failed Validation.\n';
              labels = ['invalid', 'needs-review', 'community-submission'];   // ← RED + needs review
            } else {
              summary += '✅ Marker Passed Validation.\n';
              labels = ['validated', 'community-submission'];                // ← GREEN
            }

            summary += '\n**Detailed log:**\n```\n' + log + '\n```';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

            await github.rest.issues.removeAllLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
