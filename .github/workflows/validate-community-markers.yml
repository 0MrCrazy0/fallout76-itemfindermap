name: Validate Community Markers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'community-markers/**.json'

concurrency:
  group: validate-community-markers
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate changed markers
        id: validate
        run: |
          echo "=== Validation started ===" > validation.log
          for file in community-markers/*.json; do
            if [ -f "$file" ] && [ "$file" != "community-markers/sentinel.json" ]; then
              echo "Checking: $file" >> validation.log
              python scripts/validate-community-marker.py "$file" >> validation.log 2>&1
              echo "----------------------------------------" >> validation.log
            fi
          done

      - name: Post validation results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = fs.readFileSync('validation.log', 'utf8').trim();
            const results = log.split('\n').filter(line => line.trim() !== '');

            let summary = '## 🔍 Community Marker Validation Report\n\n';
            let allValid = true;

            results.forEach(line => {
              if (line.includes('VALID:False')) allValid = false;
            });

            let labels = ['community-submission'];

            if (!allValid) {
              summary += '❌ Marker Failed Validation.\n';
              labels = ['invalid', 'needs-review', 'community-submission'];
            } else {
              summary += '✅ Marker Passed Validation.\n';
              labels = ['validated', 'community-submission'];
            }

            summary += '\n**Detailed log:**\n```\n' + log + '\n```';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

            await github.rest.issues.removeAllLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

            if (!allValid) {
              process.exit(1);   # Makes the PR show red X
            }
