name: Combine Community Markers

on:
  pull_request:
    types: [closed]
    paths:
      - 'community-markers/**.json'

# ── CONCURRENCY FIX ── Prevents cancelled checks when multiple markers are submitted quickly
concurrency:
  group: combine-community-markers
  cancel-in-progress: false

jobs:
  combine:
    if: github.event.pull_request.merged == true

    permissions:
      contents: write

    runs-on: ubuntu-latest

    # ── DEVELOPER NOTE ──
    # Node.js 24 opt-in (fixes GitHub deprecation warning)
    # This replaces the old ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION bypass
    # Will be required after June 2026
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout latest main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_COMBINE }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run community markers combiner
        run: python scripts/split-community-markers.py

      - name: Commit and push updated communitymap.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add communitymap.json
            git commit -m "Auto-update: communitymap.json (version bumped + validation passed)"
            git push
            echo "✅ Successfully updated and pushed communitymap.json"
          fi
