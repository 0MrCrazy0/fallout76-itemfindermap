name: Combine Community Markers

on:
  pull_request:
    types: [closed]

jobs:
  combine:
    if: github.event.pull_request.merged == true

    # ← This line is required for git push to work
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run community markers combiner
        run: python scripts/split-community-markers.py

      - name: Commit updated communitymap.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add communitymap.json
          git commit -m "Auto-update: communitymap.json (version bumped)" || echo "No changes to commit"
          git push
