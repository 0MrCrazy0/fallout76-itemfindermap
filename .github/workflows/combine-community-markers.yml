name: Combine Community Markers

on:
  pull_request:
    types: [closed]
    paths:
      - 'community-markers/**.json'

concurrency:
  group: combine-community-markers
  cancel-in-progress: false

jobs:
  combine:
    if: github.event.pull_request.merged == true

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main branch
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.PAT_COMBINE }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run community markers combiner
        run: python scripts/split-community-markers.py

      - name: Commit and push updated communitymap.json + cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add communitymap.json
          git add -u community-markers/     # ← Critical fix: deletes old marker files

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: communitymap.json (version bumped + marker files cleaned)"
            git push
            echo "✅ Successfully updated communitymap.json and cleaned up marker files"
          fi
