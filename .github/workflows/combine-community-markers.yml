name: Combine Community Markers

on:
  pull_request:
    types: [closed]
    paths:
      - 'community-markers/**.json'

concurrency:
  group: combine-community-markers
  cancel-in-progress: false

jobs:
  combine:
    if: github.event.pull_request.merged == true

    permissions:
      contents: write
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main branch
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.PAT_COMBINE }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run community markers combiner
        run: python scripts/split-community-markers.py

      - name: Create Pull Request for updated communitymap.json
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_COMBINE }}
          commit-message: "Auto-update: communitymap.json (version bumped + marker files cleaned)"
          title: "Auto-update: communitymap.json (version bumped + markers cleaned)"
          body: |
            Automated update from the combine-community-markers workflow.

            • Community map version bumped
            • Old marker files cleaned up
            • New approved markers added

            This PR was created automatically.
          branch: "auto/combine-community-markers"
          base: "main"
          delete-branch: true
          labels: "automated"

      - name: Enable auto-merge on the created PR
        if: steps.create_pr.outputs.pull-request-operation == 'created'
        run: gh pr merge ${{ steps.create_pr.outputs.pull-request-number }} --auto --squash
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_COMBINE }}
