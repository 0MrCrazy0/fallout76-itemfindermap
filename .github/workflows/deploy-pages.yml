name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:        # Allows manual trigger from the Actions tab if needed

permissions:
  contents: read
  pages: write
  id-token: write

# Critical: Ensures deployments run one after another (fixes your pages-build-deployment issue)
concurrency:
  group: "pages-deployment"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4   # ← Updated to v4 (removes Node 20 warning)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
