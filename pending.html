<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Community Submissions – Fallout 76 Item Finder Map</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a2a2a;
            color: #00ff00;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            text-shadow: 0 0 12px #00ff00;
            margin-bottom: 30px;
        }
        #list {
            max-width: 900px;
            margin: 0 auto 40px;
            text-align: left;
        }
        .pr {
            background: #1a3c34;
            border: 2px solid #00ff00;
            margin: 20px 0;
            padding: 20px;
            border-radius: 4px;
            text-align: left;
        }
        .pr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .pr a {
            color: #00ff88;
            font-weight: bold;
            text-decoration: none;
        }
        .pr a:hover { text-decoration: underline; }
        .loading, .empty {
            font-size: 1.2em;
            padding: 40px;
        }
        .preview-box {
            background: #0f2f2a;
            border: 1px solid #00ff00;
            padding: 10px;
            margin-top: 6px;
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
        }
        .back-btn {
            background: #00ff88;
            color: #0a2a2a;
            border: none;
            padding: 14px 32px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff00;
            border-radius: 4px;
            margin-top: 20px;
        }
        .back-btn:hover {
            background: #00ff00;
            box-shadow: 0 0 25px #00ff88;
        }
        .instruction {
            margin: 30px 0 10px;
            font-size: 1.05em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <h1>Pending Community Map Submissions</h1>
    <div id="list" class="loading">Loading pending markers…</div>

    <div class="instruction">
        Click the button below to close this page and return to the map.
    </div>
    
    <button onclick="closeAndReturn()" class="back-btn">
        ← Close this page and return to Map
    </button>

    <script>
    // Close current tab/window and return to previous state
    function closeAndReturn() {
        // Try to close the tab (works in most cases when opened from the app)
        window.close();
        
        // Fallback: If close() was blocked, redirect in same tab
        setTimeout(() => {
            window.location.replace('https://0mrcrazy0.github.io/fallout76-itemfindermap/');
        }, 800);
    }

    fetch('https://itemfinder-submit.crzymn05.workers.dev/pending')
        .then(r => {
            if (!r.ok) throw new Error('Failed to load pending list');
            return r.json();
        })
        .then(data => {
            const container = document.getElementById('list');
            container.innerHTML = '';

            if (data.length === 0) {
                container.className = 'empty';
                container.textContent = 'No pending submissions at this time.';
                return;
            }

            data.forEach(pr => {
                const div = document.createElement('div');
                div.className = 'pr';
                div.innerHTML = `
                    <div class="pr-header">
                        <strong>PR #${pr.number}</strong>
                        <span>${new Date(pr.created_at).toLocaleString()}</span>
                    </div>
                    <div>Submitted by: ${pr.user}</div>
                    <div style="margin:12px 0;"><strong>Title:</strong> ${pr.title}</div>
                    <div style="margin-bottom:12px;">
                        <strong>Preview:</strong>
                        <div class="preview-box">${pr.preview || '(no preview available)'}</div>
                    </div>
                    <a href="${pr.url}" target="_blank">View Pull Request on GitHub →</a>
                `;
                container.appendChild(div);
            });
        })
        .catch(err => {
            const container = document.getElementById('list');
            container.className = 'empty';
            container.textContent = 'Error loading list: ' + err.message;
        });
    </script>
</body>
</html>
