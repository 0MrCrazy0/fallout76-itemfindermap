<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Community Submissions</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
    body {
        font-family: 'Courier New', monospace;
        background: #0a2a2a;
        color: #00ff00;
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        text-align: center;
    }
    h1 {
        text-shadow: 0 0 20px #00ff00;
        margin-bottom: 20px;
    }
    .instruction {
        font-size: 1.35em;
        margin: 10px 0 20px;
        line-height: 1.6;
        color: #00ff88;
    }
    #list {
        flex: 1;
        max-width: 900px;
        margin: 0 auto;
        text-align: left;
        overflow-y: auto;
        padding-right: 8px;
    }
    .pr {
        background: #1a3c34;
        border: 2px solid #00ff00;
        margin: 20px 0;
        padding: 20px;
        border-radius: 6px;
    }
    .pr a {
        color: #00ff88;
        font-weight: bold;
        text-decoration: none;
    }
    .pr a:hover {
        text-decoration: underline;
    }
    .close-btn {
        background: #1a3c34;
        color: #00ff00;
        border: none;
        padding: 10px 24px;
        font-size: 1.0em;
        font-weight: bold;
        cursor: pointer;
        margin: 15px auto;
        display: block;
        box-shadow: 0 0 15px #00ff00;
        border-radius: 6px;
        transition: all 0.3s ease;
    }
    .close-btn:hover {
        background: #00ff00;
        color: #000000;
        box-shadow: 0 0 20px #00ff88;
    }
    .preview-box {
        background: #0f2f2a;
        border: 1px solid #00ff00;
        padding: 10px;
        margin-top: 8px;
        max-height: 180px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 6px;
        line-height: 1.4;
    }

    /* Back to Top Button - centered below the list */
    #backToTop {
        background: #1a3c34;
        color: #00ff00;
        border: 2px solid #00ff00;
        border-radius: 6px;
        padding: 12px 24px;
        font-size: 1.1em;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 15px #00ff00;
        margin: 20px auto 10px;
        display: block;
        transition: all 0.3s ease;
    }
    #backToTop:hover {
        background: #00ff00;
        color: #000000;
        box-shadow: 0 0 20px #00ff88;
    }

    /* PIP-BOY GREEN SCROLLBARS */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track {
        background: #000;
        border-left: 1px solid #00ff00;
        border-right: 1px solid #00ff00;
        box-shadow: inset 0 0 6px rgba(0, 255, 0, 0.2);
    }
    ::-webkit-scrollbar-thumb {
        background: #00ff00;
        border: 2px solid #000;
        border-radius: 0;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #00ff88;
        box-shadow: 0 0 8px #00ff88;
    }
    * { scrollbar-width: thin; scrollbar-color: #00ff00 #000; }
    #list::-webkit-scrollbar-thumb, .preview-box::-webkit-scrollbar-thumb {
        background: #00ff00;
        border: 2px solid #000;
    }
    </style>
</head>
<body>
    <h1>Pending Community Map Submissions</h1>
    <div class="instruction">
        This page shows pending submissions.<br>
    </div>
    <button onclick="returnToMap()" class="close-btn">
        RETURN TO MAP ← Show How to Use
    </button>
    <div id="list" class="loading">Loading pending markers…</div>

    <!-- Back to Top Button -->
    <button id="backToTop" onclick="location.reload()">↑ Back to Top</button>

    <script>
        function returnToMap() {
            sessionStorage.setItem('returnFromPending', 'true');
            window.location.replace('https://0mrcrazy0.github.io/fallout76-itemfindermap/');
        }

        fetch('https://itemfinder-submit.crzymn05.workers.dev/pending?v=20260502_' + Date.now())
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                const container = document.getElementById('list');
                container.innerHTML = '';
                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;font-size:1.2em;">No pending submissions at this time.</div>';
                    return;
                }
                data.forEach(pr => {
                    const div = document.createElement('div');
                    div.className = 'pr';
                    div.innerHTML = `
                        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                            <strong>PR #${pr.number}</strong>
                            <span>${new Date(pr.created_at).toLocaleString()}</span>
                        </div>
                        <div>Submitted by: ${pr.user}</div>
                        <div style="margin:12px 0;"><strong>Title:</strong> ${pr.title}</div>
                        <div style="margin-bottom:12px;">
                            <strong>Preview:</strong>
                            <div class="preview-box">${pr.preview || '(no preview available)'}</div>
                        </div>
                        <a href="${pr.url}" target="_blank">View Pull Request on GitHub →</a>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(() => {
                document.getElementById('list').innerHTML = '<div style="text-align:center;color:#ff6666;padding:40px;">Error loading pending submissions.</div>';
            });
    </script>
</body>
</html>
