<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Community Submissions</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a2a2a;
            color: #00ff00;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            text-shadow: 0 0 12px #00ff00;
            margin-bottom: 30px;
        }
        .instruction {
            font-size: 1.35em;
            margin: 40px 0 30px;
            line-height: 1.6;
            color: #00ff88;
        }
        #list {
            max-width: 900px;
            margin: 0 auto;
            text-align: left;
        }
        .pr {
            background: #1a3c34;
            border: 2px solid #00ff00;
            margin: 20px 0;
            padding: 20px;
            border-radius: 4px;
        }
        .pr a {
            color: #00ff88;           /* Bright readable green */
            font-weight: bold;
            text-decoration: none;
        }
        .pr a:hover {
            text-decoration: underline;
        }
        .close-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            box-shadow: 0 0 15px #ff4444;
            border-radius: 4px;
        }
        .close-btn:hover {
            background: #ff6666;
            box-shadow: 0 0 25px #ff8888;
        }
        .preview-box {
            background: #0f2f2a;
            border: 1px solid #00ff00;
            padding: 10px;
            margin-top: 8px;
            max-height: 180px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <h1>Pending Community Map Submissions</h1>

    <div class="instruction">
        This page shows pending submissions.<br><br>
        <strong>When finished, click the button below to close this tab<br>and return to the map.</strong>
    </div>

    <button onclick="closeTab()" class="close-btn">
        CLOSE THIS TAB ← Return to Map
    </button>

    <div id="list" class="loading">Loading pending markers…</div>

    <script>
    function closeTab() {
        window.close();
        setTimeout(() => {
            window.location.replace('https://0mrcrazy0.github.io/fallout76-itemfindermap/');
        }, 700);
    }

    fetch('https://itemfinder-submit.crzymn05.workers.dev/pending?' + Date.now())
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
            const container = document.getElementById('list');
            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;font-size:1.2em;">No pending submissions at this time.</div>';
                return;
            }
            data.forEach(pr => {
                const div = document.createElement('div');
                div.className = 'pr';
                div.innerHTML = `
                    <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                        <strong>PR #${pr.number}</strong>
                        <span>${new Date(pr.created_at).toLocaleString()}</span>
                    </div>
                    <div>Submitted by: ${pr.user}</div>
                    <div style="margin:12px 0;"><strong>Title:</strong> ${pr.title}</div>
                    <div style="margin-bottom:12px;">
                        <strong>Preview:</strong>
                        <div class="preview-box">${pr.preview || '(no preview available)'}</div>
                    </div>
                    <a href="${pr.url}" target="_blank">View Pull Request on GitHub →</a>
                `;
                container.appendChild(div);
            });
        })
        .catch(() => {
            document.getElementById('list').innerHTML = '<div style="text-align:center;color:#ff6666;padding:40px;">Error loading pending submissions.</div>';
        });
    </script>
</body>
</html>
