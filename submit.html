<script>
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat');
    const lng = params.get('lng');
    const category = params.get('category');
    const desc = params.get('desc');
    const icon = params.get('icon');
    const id = params.get('id');
    const cid = params.get('cid');

    // Populate fields
    document.getElementById('latLng').textContent = lat && lng ? `${lat}, ${lng}` : '(location missing)';
    document.getElementById('category').textContent = icon && category ? `${icon} ${category}` : '(category missing)';
    document.getElementById('desc').textContent = desc || '(no description)';

    const form = document.getElementById('submitForm');
    const submitBtn = document.getElementById('submitBtn');
    const loadingOverlay = document.getElementById('submitLoadingOverlay');

    const DAILY_LIMIT = 5;                    // ← Change this number anytime you want
    const DAY_IN_MS = 24 * 60 * 60 * 1000;

    // === EXACT DUPLICATE CHECK (cid) ===
    function hasBeenSubmitted(cid) {
        const submitted = JSON.parse(localStorage.getItem('submitted_cids') || '[]');
        return submitted.includes(cid);
    }

    // === DAILY LIMIT CHECK ===
    function getRecentSubmissions() {
        let timestamps = JSON.parse(localStorage.getItem('submitted_timestamps') || '[]');
        const now = Date.now();
        timestamps = timestamps.filter(ts => now - ts < DAY_IN_MS); // clean old ones
        localStorage.setItem('submitted_timestamps', JSON.stringify(timestamps));
        return timestamps;
    }

    function canSubmitToday() {
        return getRecentSubmissions().length < DAILY_LIMIT;
    }

    function recordSubmission() {
        let timestamps = JSON.parse(localStorage.getItem('submitted_timestamps') || '[]');
        timestamps.push(Date.now());
        localStorage.setItem('submitted_timestamps', JSON.stringify(timestamps));
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // 1. Exact duplicate (permanent block)
        if (cid && hasBeenSubmitted(cid)) {
            const div = document.createElement('div');
            div.innerHTML = `
                <h2 style="color:#ffcc00;">Duplicate Marker</h2>
                <p>A marker with this exact location, category, and description already exists or is pending review.</p>
                <p>No new pull request created — thank you for checking!</p>
                <button onclick="window.close()" style="margin-top:20px;">Close Window</button>
            `;
            div.style.cssText = 'padding:20px;background:rgba(255,204,0,0.2);border:2px solid #ffcc00;border-radius:4px;max-width:400px;margin:20px auto;';
            form.parentNode.insertBefore(div, form);
            form.style.display = 'none';
            return;
        }

        // 2. Daily limit check
        if (!canSubmitToday()) {
            const div = document.createElement('div');
            div.innerHTML = `
                <h2 style="color:#ffcc00;">Daily Limit Reached</h2>
                <p>You have reached the limit of <strong>${DAILY_LIMIT}</strong> submissions in the last 24 hours.</p>
                <p>Please check <a href="/fallout76-itemfindermap/pending.html" target="_blank" style="color:#00ff88;">pending.html</a> and wait for review.</p>
                <p>New submissions will be available tomorrow after MrCrazy merges your markers.</p>
                <button onclick="window.close()" style="margin-top:20px;">Close Window</button>
            `;
            div.style.cssText = 'padding:20px;background:rgba(255,204,0,0.2);border:2px solid #ffcc00;border-radius:4px;max-width:400px;margin:20px auto;';
            form.parentNode.insertBefore(div, form);
            form.style.display = 'none';
            return;
        }

        // OK to submit
        loadingOverlay.classList.add('show');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        const name = document.getElementById('name').value.trim() || 'Anonymous Wastelander';

        const marker = { lat: parseFloat(lat), lng: parseFloat(lng), category, desc, icon: icon || '📝', id, cid };

        try {
            const response = await fetch('https://itemfinder-submit.crzymn05.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'submit', marker, name })
            });

            const text = await response.text();
            loadingOverlay.classList.remove('show');

            if (response.ok) {
                recordSubmission();                    // count toward daily limit
                document.body.innerHTML = text;        // show worker's success page
            } else {
                throw new Error('Server rejected');
            }
        } catch (err) {
            loadingOverlay.classList.remove('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'SUBMIT MARKER';
            alert('Network error — please try again');
        }
    });
</script>
