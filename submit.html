<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit to Community Map</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a2a2a;
            color: #00ff00;
            padding: 20px;
            text-align: center;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            background: #1a3c34;
            padding: 25px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }
        h1 {
            margin: 0 0 20px;
            text-shadow: 0 0 10px #00ff00;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #000;
            color: #00ff00;
            border: 2px solid #00ff00;
            font-family: inherit;
            font-size: 1em;
            box-sizing: border-box;
        }
        input::placeholder {
            color: #00aa00;
            opacity: 0.8;
        }
        button {
            margin-top: 25px;
            padding: 12px 30px;
            background: #00ff00;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 0 12px #00ff00;
        }
        button:hover {
            background: #00cc00;
        }
        button:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #status {
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 1.5em;
        }
        #success, #error {
            display: none;
            padding: 15px;
            margin-top: 20px;
            border: 2px solid;
            border-radius: 0;
        }
        #success {
            background: rgba(0,255,0,0.15);
            border-color: #00ff00;
        }
        #error {
            background: rgba(255,0,0,0.15);
            border-color: #ff4444;
            color: #ff8888;
        }
        #warningBlock {
            display: none;
            padding: 15px;
            margin-top: 20px;
            border: 2px solid #ffcc00;
            background: rgba(255,204,0,0.15);
            color: #ffcc00;
            border-radius: 0;
        }
        #warningBlock h2 {
            margin: 0 0 12px;
            color: #ffcc00;
        }
        #warningBlock p {
            margin: 8px 0;
        }
        #submitLoadingOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #00ff00;
            font-size: 1.4em;
            text-shadow: 0 0 10px #00ff00;
        }
        #submitLoadingOverlay.show {
            display: flex;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #00ff00;
            border-top: 6px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Submit Marker to Community Map</h1>
        <p>Share your discovery with the wasteland!<br>MrCrazy will review and merge it soon.</p>

        <!-- Unified warning block (one title, dynamic messages, one close button) -->
        <div id="warningBlock">
            <h2></h2> <!-- Dynamic title -->
            <p></p>     <!-- Message line 1 -->
            <p></p>     <!-- Message line 2 -->
            <p></p>     <!-- Message line 3 -->
            <button onclick="window.close()" style="margin-top:20px; background:#00ff00; color:#000; padding:10px 30px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Close Window</button>
        </div>

        <form id="submitForm">
            <label>Pre-filled from your marker:</label>
            <p><strong>Location:</strong> <span id="latLng"></span></p>
            <p><strong>Category:</strong> <span id="category"></span></p>
            <p><strong>Description:</strong> <span id="desc"></span></p>
            <label for="playerName">Your In-Game Name (optional)</label>
            <input type="text" id="playerName" placeholder="e.g., VaultDweller42">
            <button type="submit" id="submitBtn">SUBMIT MARKER</button>
        </form>

        <div id="status"></div>

        <div id="success" style="display:none;">
            <h2 style="color:#00ff88;">Your marker has been submitted!</h2>
            <p>MrCrazy will review and merge it soon.</p>
            <p id="submittedDetails"></p>
            <button onclick="window.close()">Close Window</button>
        </div>

        <div id="error" style="display:none;">
            <h2 style="color:#ff8888;">Submission failed</h2>
            <p id="errorMsg"></p>
            <button onclick="location.reload()">Try Again</button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="submitLoadingOverlay">
        <div class="spinner"></div>
        <div>Submitting marker to community map...</div>
        <div style="font-size:0.8em; margin-top:15px; opacity:0.8;">Please wait a moment</div>
    </div>

    <script>
    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat');
    const lng = params.get('lng');
    const category = params.get('category');
    const desc = params.get('desc');
    const icon = params.get('icon');
    const id = params.get('id');
    const cid = params.get('cid');
    const wasCommunityKept = params.get('wasCommunityKept') === 'true';

    // Populate fields safely
    const latLngEl = document.getElementById('latLng');
    if (latLngEl) latLngEl.textContent = lat && lng ? `${lat}, ${lng}` : '(location missing)';

    const categoryEl = document.getElementById('category');
    if (categoryEl) categoryEl.textContent = icon && category ? `${icon} ${category}` : '(category missing)';

    const descEl = document.getElementById('desc');
    if (descEl) descEl.textContent = desc || '(no description)';

    const form = document.getElementById('submitForm');
    const submitBtn = document.getElementById('submitBtn');
    const loadingOverlay = document.getElementById('submitLoadingOverlay');
    const warningBlock = document.getElementById('warningBlock');
    const warningTitle = warningBlock.querySelector('h2');
    const warningLines = warningBlock.querySelectorAll('p');
    const statusDiv = document.getElementById('status');
    const successDiv = document.getElementById('success');
    const errorDiv = document.getElementById('error');

    function hasBeenSubmitted(cid) {
        if (!cid) return false;
        const submitted = JSON.parse(localStorage.getItem('submitted_cids') || '[]');
        return submitted.includes(cid);
    }

    // Force re-check of submitted_cids after a short delay (handles timing issues)
    function checkSubmittedStatus(callback) {
        setTimeout(() => {
            const isSubmitted = cid && hasBeenSubmitted(cid);
            callback(isSubmitted);
        }, 300); // 300ms delay to allow localStorage to sync
    }

    // Initial display logic
    checkSubmittedStatus((isSubmitted) => {
        if (isSubmitted) {
            warningBlock.style.display = 'block';
            warningTitle.textContent = 'Duplicate Marker';
            warningLines[0].textContent = 'A marker with this exact location, category, and description has already been submitted and is pending review.';
            warningLines[1].textContent = 'No new pull request created — thank you for checking!';
            warningLines[2].textContent = '';
            form.style.display = 'none';
        } else if (wasCommunityKept) {
            warningBlock.style.display = 'block';
            warningTitle.textContent = 'Already Part of Community Map';
            warningLines[0].textContent = 'This marker was kept from the shared community collection.';
            warningLines[1].textContent = 'It is already included — no resubmission needed.';
            warningLines[2].textContent = 'You may edit or move it freely as your own marker.';
            form.style.display = 'none';
        } else {
            form.style.display = 'block';
            warningBlock.style.display = 'none';
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Re-check before submitting
        checkSubmittedStatus((isSubmitted) => {
            if (isSubmitted) {
                warningBlock.style.display = 'block';
                warningTitle.textContent = 'Duplicate Marker';
                warningLines[0].textContent = 'A marker with this exact location, category, and description has already been submitted and is pending review.';
                warningLines[1].textContent = 'No new pull request created — thank you for checking!';
                warningLines[2].textContent = '';
                form.style.display = 'none';
                return;
            }

            loadingOverlay.classList.add('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const name = document.getElementById('playerName').value.trim() || 'Anonymous Wastelander';

            const marker = {
                lat: parseFloat(lat),
                lng: parseFloat(lng),
                category,
                desc,
                icon: icon || '📝',
                id,
                cid
            };

            fetch('https://itemfinder-submit.crzymn05.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'submit', marker, name })
            })
            .then(response => response.text().then(text => ({ ok: response.ok, text })))
            .then(({ ok, text }) => {
                loadingOverlay.classList.remove('show');
                if (ok) {
                    let submitted = JSON.parse(localStorage.getItem('submitted_cids') || '[]');
                    if (!submitted.includes(cid)) {
                        submitted.push(cid);
                        localStorage.setItem('submitted_cids', JSON.stringify(submitted));
                    }
                    document.body.innerHTML = text;
                } else {
                    throw new Error('Server rejected submission');
                }
            })
            .catch(err => {
                loadingOverlay.classList.remove('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'SUBMIT MARKER';
                errorDiv.style.display = 'block';
                document.getElementById('errorMsg').textContent = err.message || 'Network error - please try again';
                statusDiv.textContent = '';
            });
        });
    });
</script>
</body>
</html>
