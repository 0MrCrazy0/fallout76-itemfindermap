<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit to Community Map</title>
    <style>
        body{font-family:'Courier New',monospace;background:#0a2a2a;color:#00ff00;padding:20px;text-align:center;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
        form{max-width:420px;margin:0 auto;background:#1a3c34;padding:28px;border:3px solid #00ff00;box-sizing:border-box;width:100%}
        h1{margin:0 0 16px;font-size:2em;text-shadow:0 0 12px #00ff00}
        p{margin:10px 0 24px;font-size:1.1em}
        label{display:block;text-align:center;font-weight:bold;margin:20px 0 8px;color:#00ff88}
        input,button{width:100%;padding:14px;margin:0;border:2px solid #00ff00;background:#000;color:#00ff00;font-family:inherit;font-size:16px;box-sizing:border-box}
        input::placeholder{color:#00aa00;opacity:0.8}
        button{background:#00ff00;color:#000;font-weight:bold;font-size:18px;cursor:pointer;margin-top:20px;transition:background .3s}
        button:hover{background:#00cc00}
        .pre-filled{background:#0a3a0a;padding:16px;margin:20px 0;text-align:left;border:1px solid #00ff88;font-size:14px;line-height:1.6}
        a{color:#00ff88;text-decoration:underline;font-weight:bold;font-size:1.4em}
    </style>
</head>
<body>
    <div id="content">
        <h1>Submit Marker</h1>
        <p>Share your discovery with the wasteland!<br>MrCrazy will review and merge it soon.</p>
        <form id="submitForm">
            <div class="pre-filled">
                <strong>Pre-filled from your marker:</strong><br>
                Location: <span id="coords"></span><br>
                Category: <span id="category"></span><br>
                Description: <span id="desc"></span>
            </div>
            <label>Your In-Game Name (optional)</label>
            <input type="text" id="playerName" placeholder="e.g., VaultDweller42">
            <button type="submit">SUBMIT MARKER</button>
        </form>
    </div>
<script>
    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat');
    const lng = params.get('lng');
    const category = params.get('category');
    const desc = params.get('desc');
    const icon = params.get('icon');
    const id = params.get('id');
    const cid = params.get('cid');

    // Populate fields with fallback
    document.getElementById('latLng').textContent = lat && lng ? `${lat}, ${lng}` : '(location missing)';
    document.getElementById('category').textContent = icon && category ? `${icon} ${category}` : '(category missing)';
    document.getElementById('desc').textContent = desc || '(no description)';

    const form = document.getElementById('submitForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');
    const successDiv = document.getElementById('success');
    const errorDiv = document.getElementById('error');
    const loadingOverlay = document.getElementById('submitLoadingOverlay');

    // Check if this cid was already submitted
    function hasBeenSubmitted(cid) {
        const submitted = JSON.parse(localStorage.getItem('submitted_cids') || '[]');
        return submitted.includes(cid);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Re-check duplicate every time user clicks submit
        if (cid && hasBeenSubmitted(cid)) {
            // Show duplicate message instead of submitting
            const duplicateDiv = document.createElement('div');
            duplicateDiv.innerHTML = `
                <h2 style="color:#ffcc00;">Duplicate Marker</h2>
                <p>A marker with this exact location, category, and description already exists or is pending review.</p>
                <p>No new pull request created — thank you for checking!</p>
                <p style="margin-top:15px; font-size:0.9em; opacity:0.8;">(Cooldown: 10 minutes before retry allowed)</p>
                <button onclick="window.close()" style="margin-top:20px;">Close Window</button>
            `;
            duplicateDiv.style.cssText = 'padding:20px; background:rgba(255,204,0,0.2); border:2px solid #ffcc00; border-radius:4px; max-width:400px; margin:20px auto;';
            form.parentNode.insertBefore(duplicateDiv, form);
            form.style.display = 'none';
            return; // Stop submission
        }

        // Show loading overlay
        loadingOverlay.classList.add('show');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        const name = document.getElementById('name').value.trim() || 'Anonymous Wastelander';

        const marker = {
            lat: parseFloat(lat),
            lng: parseFloat(lng),
            category,
            desc,
            icon: icon || '📝',
            id,
            cid
        };

        try {
            const response = await fetch('https://itemfinder-submit.crzymn05.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'submit', marker, name })
            });

            const text = await response.text();

            loadingOverlay.classList.remove('show');

            if (response.ok) {
                // Mark as submitted only on success
                let submitted = JSON.parse(localStorage.getItem('submitted_cids') || '[]');
                if (!submitted.includes(cid)) {
                    submitted.push(cid);
                    localStorage.setItem('submitted_cids', JSON.stringify(submitted));
                }
                document.body.innerHTML = text;
            } else {
                throw new Error('Server rejected submission');
            }
        } catch (err) {
            loadingOverlay.classList.remove('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'SUBMIT MARKER';

            errorDiv.style.display = 'block';
            document.getElementById('errorMsg').textContent = err.message || 'Network error - please try again';
            statusDiv.textContent = '';
        }
    });
</script>
</body>
</html>
