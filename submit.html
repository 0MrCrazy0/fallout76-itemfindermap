<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit to Community Map</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000000;           /* ← Pure black background behind the popup */
            color: #00ff00;
            padding: 20px;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 460px;
            margin: 0 auto;
            background: #1a3c34;
            padding: 30px 25px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }
        h1 {
            margin: 0 0 20px;
            text-shadow: 0 0 10px #00ff00;
        }
        p {
            line-height: 1.5;
            color: #00ff00;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            color: #00ff88;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #000;
            color: #00ff00;
            border: 2px solid #00ff00;
            font-family: inherit;
            font-size: 1em;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 14px 32px;
            background: #00ff00;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 0 12px #00ff00;
        }
        button:hover {
            background: #00cc00;
        }
        .return-btn {
            background: #00ff88;
            color: #000;
            padding: 14px 32px;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 25px;
        }
        #success, #error, #warningBlock {
            margin-top: 25px;
            padding: 20px;
            border: 2px solid;
            border-radius: 4px;
        }
        #success {
            background: rgba(0,255,0,0.15);
            border-color: #00ff00;
        }
        #error {
            background: rgba(255,0,0,0.15);
            border-color: #ff4444;
            color: #ff8888;
        }
        #warningBlock {
            background: rgba(255,204,0,0.15);
            border-color: #ffcc00;
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Submit Marker to Community Map</h1>
        <p>Share your discovery with the wasteland!<br>A Moderator will review and merge it soon.</p>

        <!-- Return to Map button always visible on main form -->
        <button onclick="returnToMap()" class="return-btn" style="margin-bottom:20px;">← Return to Map</button>

        <!-- Warning / Duplicate Block -->
        <div id="warningBlock" style="display:none;">
            <h2 id="warningTitle"></h2>
            <p id="warningText"></p>
            <button onclick="returnToMap()" class="return-btn">Return to Map</button>
        </div>

        <!-- Submit Form -->
        <form id="submitForm">
            <label>Pre-filled from your marker:</label>
            <p><strong>Location:</strong> <span id="latLng"></span></p>
            <p><strong>Category:</strong> <span id="category"></span></p>
            <p><strong>Description:</strong> <span id="desc"></span></p>
            
            <label for="playerName">Your In-Game Name (optional)</label>
            <input type="text" id="playerName" placeholder="e.g., VaultDweller42">

            <button type="submit" id="submitBtn">SUBMIT MARKER</button>
        </form>

        <!-- Success Screen -->
        <div id="success" style="display:none;">
            <h2 style="color:#00ff88;">Thank you!</h2>
            <p>Your marker has been submitted successfully.<br>A Moderator will review and merge it soon.</p>
            <button onclick="returnToMap()" class="return-btn">Return to Map</button>
        </div>

        <!-- Error Screen -->
        <div id="error" style="display:none;">
            <h2 style="color:#ff8888;">Submission failed</h2>
            <p id="errorMsg"></p>
            <button onclick="location.reload()">Try Again</button>
            <button onclick="returnToMap()" class="return-btn" style="margin-left:10px;">Return to Map</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const lat = params.get('lat');
        const lng = params.get('lng');
        const category = params.get('category');
        const desc = params.get('desc');
        const icon = params.get('icon');
        const id = params.get('id');
        const cid = params.get('cid');
        const wasCommunityKept = params.get('wasCommunityKept') === 'true';

        document.getElementById('latLng').textContent = lat && lng ? `${lat}, ${lng}` : '(location missing)';
        document.getElementById('category').textContent = icon && category ? `${icon} ${category}` : '(category missing)';
        document.getElementById('desc').textContent = desc || '(no description)';

        const form = document.getElementById('submitForm');
        const submitBtn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('success');
        const errorDiv = document.getElementById('error');
        const warningBlock = document.getElementById('warningBlock');
        const warningTitle = document.getElementById('warningTitle');
        const warningText = document.getElementById('warningText');

        function hasBeenSubmitted(cid) {
            if (!cid) return false;
            const submitted = JSON.parse(localStorage.getItem('submitted_cids') || '[]');
            return submitted.includes(cid);
        }

        if (cid && hasBeenSubmitted(cid)) {
            warningBlock.style.display = 'block';
            warningTitle.textContent = 'Duplicate Marker';
            warningText.textContent = 'A marker with this exact location, category, and description has already been submitted.\n\nIf it does not appear in Pending Submissions, it may have been merged or removed.';
            form.style.display = 'none';
        } 
        else if (wasCommunityKept) {
            warningBlock.style.display = 'block';
            warningTitle.textContent = 'Already Part of Community Map';
            warningText.textContent = 'This marker is now part of the official community map.\nNo resubmission needed.';
            form.style.display = 'none';
        } 
        else {
            form.style.display = 'block';
        }

        function returnToMap() {
            window.location.replace('https://0mrcrazy0.github.io/fallout76-itemfindermap/');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const name = document.getElementById('playerName').value.trim() || 'Anonymous Wastelander';

            const marker = {
                lat: parseFloat(lat),
                lng: parseFloat(lng),
                category,
                desc,
                icon: icon || '📝',
                id,
                cid
            };

            try {
                const response = await fetch('https://itemfinder-submit.crzymn05.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'submit', marker, name })
                });

                if (response.ok) {
                    if (cid) {
                        let submitted = JSON.parse(localStorage.getItem('submitted_cids') || '[]');
                        if (!submitted.includes(cid)) {
                            submitted.push(cid);
                            localStorage.setItem('submitted_cids', JSON.stringify(submitted));
                        }
                    }
                    form.style.display = 'none';
                    successDiv.style.display = 'block';
                } else {
                    throw new Error('Server rejected submission');
                }
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'SUBMIT MARKER';
                errorDiv.style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Network error - please try again later.';
            }
        });
    </script>
</body>
</html>
